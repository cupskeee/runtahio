name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    # Runtahio targets macOS 26 / Swift 6.2. Pin this to an image that ships
    # the required toolchain; bump as GitHub's runner images are updated.
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select newest installed Xcode
        run: |
          set -euo pipefail
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)"
          if [ -n "${latest}" ]; then
            sudo xcode-select -s "${latest}"
          fi
          xcodebuild -version || true
          swift --version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v
