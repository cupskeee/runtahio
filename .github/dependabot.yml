version: 2
updates:
  # Runtahio has no third-party Swift package dependencies, so there is no
  # Swift Package Manager ecosystem to watch. We only keep GitHub Actions
  # (used in CI) up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
