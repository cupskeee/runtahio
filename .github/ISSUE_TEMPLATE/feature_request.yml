name: Feature request
description: Suggest an idea or improvement for Runtahio
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is your request related to a frustration or a missing capability?
      placeholder: I'm always frustrated when…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Runtahio to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or workarounds you've thought about.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: Runtahio is local-only and privacy-preserving by design.
      options:
        - label: This request keeps Runtahio fully local (no network, telemetry, or analytics).
          required: true
